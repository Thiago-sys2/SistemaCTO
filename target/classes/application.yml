server:
  port: 8080

spring:
  application:
    name: sistema-cto

  datasource:
    url: jdbc:h2:mem:sistema_cto
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
      endpoint:
        sns: http://localhost:4566

logging:
  level:
    software.amazon.awssdk: INFO
    software.amazon.awssdk.services.sns: DEBUG

app:
  sns:
    sensor-topic: sensor-status-topic